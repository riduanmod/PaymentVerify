<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Payment Verification</title>
    <style>
        :root { --primary: #00ff88; --bg: #0f172a; --surface: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--surface); padding: 2.5rem; border-radius: 1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); }
        h2 { text-align: center; margin-top: 0; background: linear-gradient(to right, #00ff88, #00bfff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #cbd5e1; }
        select, input { width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; transition: all 0.3s; }
        select:focus, input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }
        button { width: 100%; padding: 1rem; background: linear-gradient(to right, #00bfff, #00ff88); border: none; border-radius: 0.5rem; color: #000; font-weight: bold; font-size: 1rem; cursor: pointer; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        #status { margin-top: 1rem; text-align: center; font-weight: bold; }
        .success { color: #00ff88; }
        .error { color: #ff4757; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Verify Payment</h2>
        <div class="form-group">
            <label>Payment Method</label>
            <select id="method">
                <option value="bKash">bKash</option>
                <option value="Nagad">Nagad</option>
                <option value="Rocket">Rocket</option>
            </select>
        </div>
        <div class="form-group">
            <label>Amount (৳)</label>
            <input type="number" id="amount" placeholder="e.g. 500" required>
        </div>
        <div class="form-group">
            <label>Transaction ID</label>
            <input type="text" id="trxId" placeholder="e.g. 9F3HG8X" required>
        </div>
        <button onclick="verifyPayment()">Verify Now</button>
        <div id="status"></div>
    </div>

    <script>
        // Replace with your FastAPI backend URL
        const API_URL = "https://payment-verify-green.vercel.app/api/verify";

        async function verifyPayment() {
            const method = document.getElementById('method').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const trxId = document.getElementById('trxId').value.trim();
            const statusDiv = document.getElementById('status');

            if(!amount || !trxId) {
                statusDiv.innerHTML = "<span class='error'>Please fill all fields.</span>";
                return;
            }

            statusDiv.innerHTML = "Verifying...";
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ method, amount, trx_id: trxId })
                });
                
                const data = await response.json();
                
                if(response.ok) {
                    statusDiv.innerHTML = `<span class='success'>${data.message}</span>`;
                } else {
                    statusDiv.innerHTML = `<span class='error'>${data.detail}</span>`;
                }
            } catch (error) {
                statusDiv.innerHTML = "<span class='error'>Network error. Server unreachable.</span>";
            }
        }
    </script>
</body>
</html>
